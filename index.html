<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทำข้อสอบออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .quiz-card { display: none; }
        .quiz-card.active { display: block; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-8">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">แบบทดสอบออนไลน์</h1>

        <!-- ส่วนกรอกข้อมูลผู้สอบ -->
        <div id="info-section">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ชื่อ</label>
                    <input type="text" id="firstName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="กรอกชื่อ" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">นามสกุล</label>
                    <input type="text" id="lastName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="กรอกนามสกุล" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">ตำบล</label>
                    <input type="text" id="tambon" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="กรอกตำบล" required>
                </div>
                <button onclick="startQuiz()" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">เริ่มทำข้อสอบ</button>
            </div>
        </div>

        <!-- ส่วนข้อสอบ -->
        <div id="quiz-section" class="hidden">
            <form id="quizForm" class="space-y-8">
                <!-- ตัวอย่างข้อที่ 1 -->
                <div class="question-item">
                    <p class="font-semibold text-lg mb-3">1. ข้อใดคือเมืองหลวงของประเทศไทย?</p>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q1" value="ก" class="h-4 w-4 text-blue-600">
                            <span>ก. เชียงใหม่</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q1" value="ข" class="h-4 w-4 text-blue-600">
                            <span>ข. กรุงเทพมหานคร</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q1" value="ค" class="h-4 w-4 text-blue-600">
                            <span>ค. ภูเก็ต</span>
                        </label>
                    </div>
                </div>

                <!-- ตัวอย่างข้อที่ 2 -->
                <div class="question-item">
                    <p class="font-semibold text-lg mb-3">2. 5 + 5 มีค่าเท่ากับเท่าไหร่?</p>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q2" value="ก" class="h-4 w-4 text-blue-600">
                            <span>ก. 10</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q2" value="ข" class="h-4 w-4 text-blue-600">
                            <span>ข. 15</span>
                        </label>
                        <label class="flex items-center space-x-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q2" value="ค" class="h-4 w-4 text-blue-600">
                            <span>ค. 20</span>
                        </label>
                    </div>
                </div>

                <button type="button" onclick="submitQuiz()" class="w-full bg-green-600 text-white py-3 rounded-md font-bold hover:bg-green-700 transition">ส่งข้อสอบ</button>
            </form>
        </div>

        <!-- ส่วนแสดงผลคะแนนและเฉลย -->
        <div id="result-section" class="hidden text-center space-y-6">
            <div class="bg-blue-50 p-6 rounded-lg">
                <h2 class="text-xl font-bold">ผลคะแนนของคุณ</h2>
                <p id="score-display" class="text-4xl font-extrabold text-blue-600 my-2">0 / 2</p>
                <p id="status-message" class="text-gray-600"></p>
            </div>
            
            <div class="text-left">
                <h3 class="font-bold text-lg mb-4">เฉลยคำตอบ:</h3>
                <div id="review-content" class="space-y-4"></div>
            </div>

            <button onclick="window.location.reload()" class="text-blue-600 underline">ทำใหม่อีกครั้ง</button>
        </div>
    </div>

    <script>
        // ตั้งค่าเฉลยที่นี่
        const answers = {
            q1: { correct: "ข", text: "กรุงเทพมหานคร" },
            q2: { correct: "ก", text: "10" }
        };

        // URL สำหรับส่ง Google Form (ต้องเปลี่ยน /viewform เป็น /formResponse)
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScGb0X_NmVogie8Rdocb9lYaLQpykqBxSNEWYFKe6rykFUAoQ/formResponse";

        // ** สำคัญ: ต้องหา Entry ID ของแต่ละช่องใน Google Form ของคุณมาใส่ที่นี่ **
        const ENTRY_IDS = {
            firstName: "entry.123456789", // เปลี่ยนเลขเหล่านี้
            lastName: "entry.987654321",  // เปลี่ยนเลขเหล่านี้
            tambon: "entry.112233445",    // เปลี่ยนเลขเหล่านี้
            score: "entry.556677889"      // เปลี่ยนเลขเหล่านี้
        };

        function startQuiz() {
            const fName = document.getElementById('firstName').value;
            const lName = document.getElementById('lastName').value;
            const tambon = document.getElementById('tambon').value;

            if (!fName || !lName || !tambon) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนเริ่ม");
                return;
            }
            document.getElementById('info-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function submitQuiz() {
            const form = document.getElementById('quizForm');
            const formData = new FormData(form);
            let score = 0;
            let total = Object.keys(answers).length;
            let reviewHtml = "";

            // ตรวจสอบคะแนนและสร้างเฉลย
            for (let [key, value] of Object.entries(answers)) {
                const userAns = formData.get(key);
                const isCorrect = userAns === value.correct;
                if (isCorrect) score++;

                reviewHtml += `
                    <div class="p-3 border rounded ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
                        <p class="font-medium">${key.replace('q', 'ข้อที่ ')}: ${isCorrect ? '✅ ถูกต้อง' : '❌ ผิด'}</p>
                        <p class="text-sm text-gray-600">คำตอบที่ถูกต้องคือ: ${value.correct}. ${value.text}</p>
                    </div>
                `;
            }

            // แสดงผลบนหน้าเว็บทันที
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score} / ${total}`;
            document.getElementById('review-content').innerHTML = reviewHtml;
            window.scrollTo(0,0);

            // ส่งข้อมูลไป Google Form (Background)
            sendToGoogleForm(score);
        }

        function sendToGoogleForm(score) {
            const fName = document.getElementById('firstName').value;
            const lName = document.getElementById('lastName').value;
            const tambon = document.getElementById('tambon').value;

            const params = new URLSearchParams();
            params.append(ENTRY_IDS.firstName, fName);
            params.append(ENTRY_IDS.lastName, lName);
            params.append(ENTRY_IDS.tambon, tambon);
            params.append(ENTRY_IDS.score, score);

            // ส่งแบบ no-cors เพื่อไม่ให้ติดปัญหา Security แต่ข้อมูลจะเข้า Form ปกติ
            fetch(FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            }).then(() => {
                console.log("Data sent to Google Form successfully");
            }).catch(err => {
                console.error("Error sending data:", err);
            });
        }
    </script>
</body>
</html>
