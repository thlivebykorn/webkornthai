    list.appendChild(li);

  let lastMsg = fixed27[0];
  const marq = document.getElementById("marq");
  const spicy = document.getElementById("spicy");
  const auto = document.getElementById("auto");

  function pickFrom(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function randomMsg(){
    // ถ้าเปิดโหมดกวนๆ ให้สุ่มจาก spicy เป็นหลัก (70%) ไม่งั้นสุ่มจาก 27
    const useSpicy = spicy.checked && Math.random() < 0.7;
    lastMsg = useSpicy ? pickFrom(spicyPool) : pickFrom(fixed27);
    marq.textContent = "🚨 " + lastMsg + " 🚨";
  }

  function copyCurrent(){
    const text = lastMsg || "";
    (navigator.clipboard?.writeText(text) || Promise.reject())
      .then(() => alert("คัดลอกแล้ว ✅"))
      .catch(() => {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        alert("คัดลอกแล้ว ✅");
      });
  }

  // สุ่มอัตโนมัติ (แบบขี้เกียจๆ)
  let timer = null;
  function setAuto(){
    if (timer) clearInterval(timer);
    timer = null;
    if (auto.checked){
      timer = setInterval(randomMsg, 3500);
    }
  }

  auto.addEventListener("change", setAuto);

  randomMsg();
  setAuto();
</script>
